<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CargoQuotes — Trainer Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f14;--surface:#161a22;--card:#1d2330;--border:#2a3245;
  --accent:#f5a623;--accent2:#4fc3f7;--success:#66bb6a;--error:#ef5350;
  --text:#e8eaf0;--muted:#7a8499;
  --ltl:#9b59b6;--tl:#e67e22;--either:#1abc9c;--adv:#e74c3c;--ct:#f39c12;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── HEADER ── */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-size:1.05rem;font-weight:800;letter-spacing:2px;color:var(--accent);}
.logo span{color:var(--text);}
.logo-sub{font-size:.68rem;color:var(--muted);font-family:'IBM Plex Mono',monospace;letter-spacing:1px;margin-top:1px;}
.hdr-right{display:flex;gap:12px;align-items:center;}
.refresh-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:7px 16px;border-radius:6px;font-family:'Syne',sans-serif;font-weight:700;font-size:.75rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.refresh-btn:hover{border-color:var(--accent2);color:var(--accent2);}
.back-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:7px 16px;border-radius:6px;font-family:'Syne',sans-serif;font-weight:700;font-size:.75rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s;display:none;}
.back-btn:hover{border-color:var(--accent);color:var(--accent);}
.last-updated{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--muted);}

main{padding:28px 32px;max-width:1200px;margin:0 auto;}

/* ── LOADING ── */
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;}
.loading-dots{display:flex;gap:8px;}
.ld{width:10px;height:10px;border-radius:50%;background:var(--accent);animation:ldp 1s infinite;}
.ld:nth-child(2){animation-delay:.2s;}.ld:nth-child(3){animation-delay:.4s;}
@keyframes ldp{0%,100%{opacity:.2;transform:scale(.7);}50%{opacity:1;transform:scale(1);}}
.loading-text{font-size:.88rem;color:var(--muted);}

/* ── KPI ROW ── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;}
.kpi-val{font-size:2.2rem;font-weight:800;color:var(--accent);line-height:1;}
.kpi-lbl{font-size:.72rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-top:6px;}
.kpi-sub{font-size:.75rem;color:var(--muted);margin-top:4px;font-family:'IBM Plex Mono',monospace;}

/* ── SECTION HEADERS ── */
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;margin-top:28px;}
.section-hdr h2{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted);}
.section-hdr span{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--muted);}

/* ── REP TABLE ── */
.rep-table{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.rt-header{background:var(--surface);display:grid;grid-template-columns:1fr 70px 90px 70px 90px 110px 90px;padding:10px 18px;font-family:'IBM Plex Mono',monospace;font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
.rt-row{display:grid;grid-template-columns:1fr 70px 90px 70px 90px 110px 90px;padding:14px 18px;border-top:1px solid var(--border);align-items:center;cursor:pointer;transition:background .15s;}
.rt-row:hover{background:rgba(245,166,35,.04);}
.rt-name{font-weight:700;font-size:.9rem;color:var(--accent2);}
.rt-name:hover{text-decoration:underline;}
.rt-cell{font-family:'IBM Plex Mono',monospace;font-size:.82rem;color:var(--muted);text-align:center;}
.rt-score{font-weight:600;}
.grade-pill{display:inline-block;padding:2px 10px;border-radius:10px;font-family:'IBM Plex Mono',monospace;font-size:.72rem;font-weight:600;}
.gA{background:rgba(102,187,106,.15);color:var(--success);}
.gB{background:rgba(79,195,247,.15);color:var(--accent2);}
.gC{background:rgba(245,166,35,.15);color:var(--accent);}
.gD{background:rgba(239,83,80,.15);color:var(--error);}

/* ── MISSED QUESTIONS ── */
.missed-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.missed-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;}
.missed-rank{font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--muted);margin-bottom:4px;}
.missed-subject{font-size:.82rem;font-weight:600;margin-bottom:6px;line-height:1.4;}
.missed-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.missed-pct{font-size:1.3rem;font-weight:800;color:var(--error);}
.missed-count{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--muted);}
.mod-tag{font-family:'IBM Plex Mono',monospace;font-size:.68rem;padding:2px 8px;border-radius:8px;}

/* ── TREND CHART ── */
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;}
.chart-empty{text-align:center;color:var(--muted);font-size:.85rem;padding:40px 0;}

/* ── NO DATA ── */
.no-data{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:40px;text-align:center;color:var(--muted);}
.no-data h3{font-size:1rem;margin-bottom:8px;color:var(--text);}

/* ══════════════════════════════════════
   REP PROFILE PAGE
══════════════════════════════════════ */
#repProfile{display:none;}

.profile-hero{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px 32px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:20px;}
.profile-name{font-size:1.8rem;font-weight:800;}
.profile-meta{font-family:'IBM Plex Mono',monospace;font-size:.78rem;color:var(--muted);margin-top:6px;}
.profile-kpis{display:flex;gap:20px;flex-wrap:wrap;}
.profile-kpi{text-align:center;}
.profile-kpi-val{font-size:1.6rem;font-weight:800;line-height:1;}
.profile-kpi-lbl{font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-top:3px;}

/* Score over time */
.score-chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:24px;}
.score-chart-wrap h3{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:16px;}

/* Module heatmap */
.mod-heatmap{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:24px;}
.mod-heatmap h3{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:16px;}
.mod-row{display:flex;align-items:center;gap:14px;margin-bottom:12px;}
.mod-row:last-child{margin-bottom:0;}
.mod-row-label{font-family:'IBM Plex Mono',monospace;font-size:.75rem;color:var(--muted);width:150px;flex-shrink:0;}
.mod-row-track{flex:1;height:10px;background:var(--border);border-radius:5px;overflow:hidden;}
.mod-row-fill{height:100%;border-radius:5px;transition:width .6s;}
.mod-row-pct{font-family:'IBM Plex Mono',monospace;font-size:.75rem;font-weight:600;width:44px;text-align:right;}
.mod-row-count{font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--muted);width:70px;text-align:right;}

/* Session list */
.sessions-list{display:flex;flex-direction:column;gap:12px;margin-bottom:24px;}
.session-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.session-card-hdr{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .15s;}
.session-card-hdr:hover{background:rgba(255,255,255,.02);}
.session-card-hdr-left{display:flex;align-items:center;gap:14px;}
.session-num{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--muted);width:32px;}
.session-date{font-size:.88rem;font-weight:700;}
.session-meta{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--muted);margin-top:2px;}
.session-card-hdr-right{display:flex;align-items:center;gap:16px;}
.session-score-big{font-size:1.1rem;font-weight:800;}
.session-time{font-family:'IBM Plex Mono',monospace;font-size:.75rem;color:var(--muted);}
.session-chevron{color:var(--muted);transition:transform .2s;font-size:.9rem;}
.session-chevron.open{transform:rotate(90deg);}

/* Question detail */
.session-questions{display:none;border-top:1px solid var(--border);}
.session-questions.show{display:block;}
.sq-header{background:var(--surface);padding:8px 18px;display:grid;grid-template-columns:32px 1fr 80px 70px;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
.sq-row{padding:9px 18px;border-top:1px solid rgba(255,255,255,.03);display:grid;grid-template-columns:32px 1fr 80px 70px;gap:8px;align-items:center;font-size:.78rem;}
.sq-row:nth-child(even){background:rgba(255,255,255,.01);}
.sq-num{font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:var(--muted);}
.sq-subject{color:var(--text);line-height:1.4;}
.sq-mod{font-family:'IBM Plex Mono',monospace;font-size:.65rem;padding:2px 7px;border-radius:6px;text-align:center;}
.sq-result{font-family:'IBM Plex Mono',monospace;font-size:.72rem;text-align:center;}
.sq-pass{color:var(--success);}
.sq-fail{color:var(--error);}
.sq-skip{color:var(--muted);}
.sq-reveal{color:var(--muted);}

@media(max-width:800px){
  main{padding:16px;}
  .kpi-row{grid-template-columns:1fr 1fr;}
  .rt-header,.rt-row{grid-template-columns:1fr 70px 90px 70px;}
  .rt-cell.hide-mobile{display:none;}
  .missed-grid{grid-template-columns:1fr;}
  .profile-hero{flex-direction:column;}
  .sq-header,.sq-row{grid-template-columns:24px 1fr 70px;}
}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Cargo<span>Quotes</span></div>
    <div class="logo-sub" id="headerSub">TRAINER DASHBOARD</div>
  </div>
  <div class="hdr-right">
    <span class="last-updated" id="lastUpdated"></span>
    <button class="back-btn" id="backBtn" onclick="showDashboard()">← All Reps</button>
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()">↻ Refresh</button>
  </div>
</header>

<main>
  <div id="loading">
    <div class="loading-dots"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div>
    <div class="loading-text">Loading training data...</div>
  </div>
  <div id="dashMain" style="display:none"></div>
  <div id="repProfile" style="display:none"></div>
</main>

<script>
const SB_URL = 'https://qmiezaefqoqtxxwuibrx.supabase.co';
const SB_KEY = 'sb_publishable_Wpsb8LoctfiinNPNcQ_c2g_nzzJ--oC';

const MOD_LABELS = {ltl:'LTL',tl:'Truckload',either:'Either Way',adv:'Advanced',ct:'Critical Thinking'};
const MOD_COLORS = {ltl:'#9b59b6',tl:'#e67e22',either:'#1abc9c',adv:'#e74c3c',ct:'#f39c12'};

let allSessions = [];
let repMap = {};

// ══════════════════════════════════════
// DATA FETCHING
// ══════════════════════════════════════
async function fetchSessions() {
  const res = await fetch(`${SB_URL}/rest/v1/training_sessions?order=completed_at.desc&limit=1000`, {
    headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`}
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
  return res.json();
}

// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
function gradeFromPct(p){return p>=90?'A':p>=75?'B':p>=60?'C':'D';}
function gradeClass(g){return{A:'gA',B:'gB',C:'gC',D:'gD'}[g]||'gD';}
function scoreColor(p){return p>=80?'var(--success)':p>=60?'var(--accent)':'var(--error)';}
function fmtDate(iso){return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function fmtDateShort(iso){return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function fmtTime(s){const m=Math.floor((s||0)/60),sec=(s||0)%60;return`${m}m ${sec}s`;}
function parseMods(s){try{return JSON.parse(s||'{}');}catch{return{};}}
function parseQD(s){try{return JSON.parse(s||'[]');}catch{return[];}}

function buildRepMap(sessions) {
  const m = {};
  sessions.forEach(s => {
    const n = s.trainee_name || 'Unknown';
    if (!m[n]) m[n] = [];
    m[n].push(s);
  });
  // each rep's sessions are already desc by completed_at; keep that
  return m;
}

function buildMissedMap(sessions) {
  const map = {};
  sessions.forEach(s => {
    parseQD(s.question_details).forEach(q => {
      if (q.skipped) return;
      if (!map[q.exercise_id]) map[q.exercise_id] = {subject:q.subject,mod:q.module,failed:0,total:0};
      map[q.exercise_id].total++;
      if (!q.passed && !q.revealed) map[q.exercise_id].failed++;
    });
  });
  return Object.entries(map)
    .filter(([,v])=>v.total>=2)
    .map(([id,v])=>({id,...v,failPct:Math.round(v.failed/v.total*100)}))
    .sort((a,b)=>b.failPct-a.failPct)
    .slice(0,8);
}

// ══════════════════════════════════════
// SVG CHARTS
// ══════════════════════════════════════
function lineChart(dataPoints, labels, W=700, H=160) {
  if (dataPoints.length < 2) return '<div class="chart-empty">Need at least 2 sessions to show trend.</div>';
  const pad={t:20,r:20,b:30,l:36};
  const cW=W-pad.l-pad.r, cH=H-pad.t-pad.b;
  const minV=Math.max(0,Math.min(...dataPoints)-10);
  const maxV=Math.min(100,Math.max(...dataPoints)+10);
  const xS=(i)=>pad.l+i*(cW/(dataPoints.length-1));
  const yS=(v)=>pad.t+cH-((v-minV)/(maxV-minV||1))*cH;
  const pts=dataPoints.map((v,i)=>`${xS(i)},${yS(v)}`).join(' ');
  const area=`${pad.l},${pad.t+cH} ${pts} ${xS(dataPoints.length-1)},${pad.t+cH}`;

  // Y axis ticks
  const yTicks=[0,25,50,75,100].filter(t=>t>=minV&&t<=maxV);
  const yTicksHTML=yTicks.map(t=>`
    <line x1="${pad.l}" x2="${W-pad.r}" y1="${yS(t)}" y2="${yS(t)}" stroke="rgba(255,255,255,.05)" stroke-width="1"/>
    <text x="${pad.l-6}" y="${yS(t)+4}" text-anchor="end" font-size="9" fill="#7a8499" font-family="IBM Plex Mono">${t}%</text>
  `).join('');

  const dotsHTML=dataPoints.map((v,i)=>`
    <circle cx="${xS(i)}" cy="${yS(v)}" r="4" fill="${scoreColor(v)}" stroke="var(--bg)" stroke-width="2"/>
    <text x="${xS(i)}" y="${yS(v)-10}" text-anchor="middle" font-size="9" fill="${scoreColor(v)}" font-family="IBM Plex Mono" font-weight="600">${v}%</text>
  `).join('');

  const labelsHTML=labels.map((l,i)=>`
    <text x="${xS(i)}" y="${H-4}" text-anchor="middle" font-size="8" fill="#7a8499" font-family="IBM Plex Mono">${l}</text>
  `).join('');

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
    <defs><linearGradient id="lg${W}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5a623" stop-opacity=".2"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </linearGradient></defs>
    ${yTicksHTML}
    <polygon points="${area}" fill="url(#lg${W})"/>
    <polyline points="${pts}" fill="none" stroke="#f5a623" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${dotsHTML}
    ${labelsHTML}
  </svg>`;
}

// ══════════════════════════════════════
// MAIN DASHBOARD
// ══════════════════════════════════════
async function loadData() {
  document.getElementById('loading').style.display='flex';
  document.getElementById('dashMain').style.display='none';
  document.getElementById('repProfile').style.display='none';
  document.getElementById('backBtn').style.display='none';
  document.getElementById('refreshBtn').textContent='↻ Refresh';
  document.getElementById('headerSub').textContent='TRAINER DASHBOARD';

  try {
    allSessions = await fetchSessions();
    repMap = buildRepMap(allSessions);
  } catch(e) {
    document.getElementById('loading').innerHTML=`
      <div style="text-align:center">
        <div style="font-size:1.1rem;font-weight:700;margin-bottom:8px;color:var(--error)">Could not load data</div>
        <div style="color:var(--muted);font-size:.85rem;margin-bottom:16px">${e.message}</div>
        <button class="refresh-btn" onclick="loadData()">Try Again</button>
      </div>`;
    return;
  }

  document.getElementById('loading').style.display='none';
  document.getElementById('lastUpdated').textContent='Updated '+new Date().toLocaleTimeString();

  if (allSessions.length===0) {
    document.getElementById('dashMain').innerHTML=`<div class="no-data"><h3>No training sessions yet</h3><p>Once reps complete sessions their results appear here automatically.</p></div>`;
    document.getElementById('dashMain').style.display='block';
    return;
  }

  renderDashboard();
}

function renderDashboard() {
  const repNames = Object.keys(repMap).sort();
  const avgScore = Math.round(allSessions.reduce((a,s)=>a+s.pct,0)/allSessions.length);
  const avgTime = Math.round(allSessions.reduce((a,s)=>a+(s.elapsed_seconds||0),0)/allSessions.length);
  const missed = buildMissedMap(allSessions);

  // KPIs
  const kpiHTML=`<div class="kpi-row">
    <div class="kpi"><div class="kpi-val">${repNames.length}</div><div class="kpi-lbl">Trainees</div><div class="kpi-sub">with recorded sessions</div></div>
    <div class="kpi"><div class="kpi-val">${allSessions.length}</div><div class="kpi-lbl">Total Sessions</div><div class="kpi-sub">across all reps</div></div>
    <div class="kpi"><div class="kpi-val" style="color:${scoreColor(avgScore)}">${avgScore}%</div><div class="kpi-lbl">Avg Score</div><div class="kpi-sub">all sessions combined</div></div>
    <div class="kpi"><div class="kpi-val">${fmtTime(avgTime)}</div><div class="kpi-lbl">Avg Time</div><div class="kpi-sub">per session</div></div>
  </div>`;

  // Rep table
  const repRowsHTML=repNames.map(name=>{
    const sessions=repMap[name];
    const avgPct=Math.round(sessions.reduce((a,s)=>a+s.pct,0)/sessions.length);
    const latest=sessions[0];
    const best=Math.max(...sessions.map(s=>s.pct));
    const grade=gradeFromPct(avgPct);
    const avgT=Math.round(sessions.reduce((a,s)=>a+(s.elapsed_seconds||0),0)/sessions.length);
    // trend: compare first half vs second half
    const half=Math.ceil(sessions.length/2);
    const recentAvg=Math.round(sessions.slice(0,half).reduce((a,s)=>a+s.pct,0)/half);
    const olderAvg=sessions.length>1?Math.round(sessions.slice(half).reduce((a,s)=>a+s.pct,0)/Math.max(sessions.length-half,1)):recentAvg;
    const trendHTML=sessions.length<2?'<span style="color:var(--muted)">—</span>':
      recentAvg>olderAvg+4?'<span style="color:var(--success)">↑ Up</span>':
      recentAvg<olderAvg-4?'<span style="color:var(--error)">↓ Down</span>':
      '<span style="color:var(--muted)">→ Steady</span>';
    return `<div class="rt-row" onclick="showRepProfile('${name.replace(/'/g,"\\'")}')">
      <span class="rt-name">${name}</span>
      <span class="rt-cell">${sessions.length}</span>
      <span class="rt-cell rt-score" style="color:${scoreColor(avgPct)}">${avgPct}%</span>
      <span class="rt-cell"><span class="grade-pill ${gradeClass(grade)}">${grade}</span></span>
      <span class="rt-cell hide-mobile">${best}%</span>
      <span class="rt-cell hide-mobile">${fmtDate(latest.completed_at)}</span>
      <span class="rt-cell">${trendHTML}</span>
    </div>`;
  }).join('');

  const repTableHTML=`
    <div class="section-hdr"><h2>Rep Performance</h2><span>Click a rep to view full profile</span></div>
    <div class="rep-table">
      <div class="rt-header">
        <span>Trainee</span>
        <span style="text-align:center">Sessions</span>
        <span style="text-align:center">Avg Score</span>
        <span style="text-align:center">Grade</span>
        <span style="text-align:center" class="hide-mobile">Best</span>
        <span style="text-align:center" class="hide-mobile">Last Active</span>
        <span style="text-align:center">Trend</span>
      </div>
      ${repRowsHTML}
    </div>`;

  // Overall trend chart
  const recentSessions=[...allSessions].reverse().slice(-20);
  const trendChartHTML=`
    <div class="section-hdr"><h2>Score Trend — All Sessions</h2><span>Most recent 20 sessions</span></div>
    <div class="chart-wrap">
      ${lineChart(recentSessions.map(s=>s.pct), recentSessions.map(s=>fmtDateShort(s.completed_at)))}
    </div>`;

  // Most missed
  const missedHTML=missed.length?`
    <div class="section-hdr"><h2>Most Missed Exercises</h2><span>Ranked by fail rate across all sessions</span></div>
    <div class="missed-grid">
      ${missed.map((m,i)=>{
        const c=MOD_COLORS[m.mod]||'#7a8499';
        return `<div class="missed-card">
          <div class="missed-rank">#${i+1} Most Missed</div>
          <div class="missed-subject">${m.subject}</div>
          <div class="missed-meta">
            <span class="missed-pct">${m.failPct}%</span>
            <span class="missed-count">fail rate · ${m.failed}/${m.total} attempts</span>
            <span class="mod-tag" style="background:${c}22;color:${c}">${MOD_LABELS[m.mod]||m.mod}</span>
          </div>
        </div>`;
      }).join('')}
    </div>` : '';

  document.getElementById('dashMain').innerHTML = kpiHTML + repTableHTML + trendChartHTML + missedHTML;
  document.getElementById('dashMain').style.display='block';
}

// ══════════════════════════════════════
// REP PROFILE PAGE
// ══════════════════════════════════════
function showRepProfile(name) {
  const sessions = repMap[name];
  if (!sessions) return;

  document.getElementById('dashMain').style.display='none';
  document.getElementById('repProfile').style.display='block';
  document.getElementById('backBtn').style.display='inline-block';
  document.getElementById('refreshBtn').style.display='none';
  document.getElementById('headerSub').textContent='REP PROFILE';

  // Aggregate stats
  const avgPct = Math.round(sessions.reduce((a,s)=>a+s.pct,0)/sessions.length);
  const bestPct = Math.max(...sessions.map(s=>s.pct));
  const avgTime = Math.round(sessions.reduce((a,s)=>a+(s.elapsed_seconds||0),0)/sessions.length);
  const grade = gradeFromPct(avgPct);
  const firstDate = fmtDate(sessions[sessions.length-1].completed_at);
  const lastDate = fmtDate(sessions[0].completed_at);

  // Hero
  const heroHTML=`<div class="profile-hero">
    <div>
      <div class="profile-name">${name}</div>
      <div class="profile-meta">First session: ${firstDate} · Latest: ${lastDate} · ${sessions.length} total session${sessions.length>1?'s':''}</div>
    </div>
    <div class="profile-kpis">
      <div class="profile-kpi">
        <div class="profile-kpi-val" style="color:${scoreColor(avgPct)}">${avgPct}%</div>
        <div class="profile-kpi-lbl">Avg Score</div>
      </div>
      <div class="profile-kpi">
        <div class="profile-kpi-val" style="color:var(--success)">${bestPct}%</div>
        <div class="profile-kpi-lbl">Best Score</div>
      </div>
      <div class="profile-kpi">
        <div class="profile-kpi-val"><span class="grade-pill ${gradeClass(grade)}" style="font-size:1.1rem;padding:4px 14px">${grade}</span></div>
        <div class="profile-kpi-lbl">Overall Grade</div>
      </div>
      <div class="profile-kpi">
        <div class="profile-kpi-val" style="color:var(--accent2)">${fmtTime(avgTime)}</div>
        <div class="profile-kpi-lbl">Avg Time</div>
      </div>
    </div>
  </div>`;

  // Score over time chart (sessions oldest→newest)
  const chartSessions=[...sessions].reverse();
  const chartHTML=`<div class="score-chart-wrap">
    <h3>Score Over Time</h3>
    ${lineChart(chartSessions.map(s=>s.pct), chartSessions.map((s,i)=>`S${i+1}`))}
    ${sessions.length<2?'':`<div style="font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--muted);margin-top:8px;text-align:right">
      ${sessions.length} sessions · Started at ${chartSessions[0].pct}% · Latest ${chartSessions[chartSessions.length-1].pct}%
      ${chartSessions[chartSessions.length-1].pct > chartSessions[0].pct
        ? ` · <span style="color:var(--success)">↑ +${chartSessions[chartSessions.length-1].pct-chartSessions[0].pct}% improvement</span>`
        : chartSessions[chartSessions.length-1].pct < chartSessions[0].pct
        ? ` · <span style="color:var(--error)">↓ ${chartSessions[chartSessions.length-1].pct-chartSessions[0].pct}% change</span>`
        : ''}
    </div>`}
  </div>`;

  // Module breakdown (aggregate across all sessions)
  const modTotals={};
  sessions.forEach(s=>{
    const mods=parseMods(s.mod_scores);
    Object.entries(mods).forEach(([m,v])=>{
      if(!modTotals[m])modTotals[m]={pass:0,total:0};
      modTotals[m].pass+=v.pass||0;
      modTotals[m].total+=v.total||0;
    });
  });
  const modRows=Object.entries(modTotals).sort((a,b)=>b[1].total-a[1].total).map(([m,v])=>{
    const pct=v.total?Math.round(v.pass/v.total*100):0;
    const color=MOD_COLORS[m]||'#7a8499';
    const bar=Math.max(2,pct);
    return `<div class="mod-row">
      <span class="mod-row-label">${MOD_LABELS[m]||m}</span>
      <div class="mod-row-track"><div class="mod-row-fill" style="width:${bar}%;background:${color}"></div></div>
      <span class="mod-row-pct" style="color:${scoreColor(pct)}">${pct}%</span>
      <span class="mod-row-count">${v.pass}/${v.total} correct</span>
    </div>`;
  }).join('');
  const modHTML=`<div class="mod-heatmap">
    <h3>Performance by Module</h3>
    ${modRows||'<div class="chart-empty">No module data available.</div>'}
  </div>`;

  // Session list with expandable question detail
  const sessListHTML=`
    <div class="section-hdr"><h2>All Sessions</h2><span>Click a session to see question detail</span></div>
    <div class="sessions-list">
      ${sessions.map((s,i)=>{
        const qd=parseQD(s.question_details);
        const sessionNum=sessions.length-i; // 1=first, N=latest
        const pct=s.pct||0;
        const grade=gradeFromPct(pct);
        const mods=parseMods(s.mod_scores);
        const modSummary=Object.entries(mods).map(([m,v])=>`${MOD_LABELS[m]||m}: ${v.pass}/${v.total}`).join(' · ')||'—';

        const qdRows=qd.length?qd.map((q,qi)=>{
          const color=MOD_COLORS[q.module]||'#7a8499';
          const resultClass=q.skipped?'sq-skip':q.revealed?'sq-reveal':q.passed?'sq-pass':'sq-fail';
          const resultText=q.skipped?'Skipped':q.revealed?'Revealed':q.passed?`✓ ${q.field_score}/${q.total_fields}`:`✗ ${q.field_score}/${q.total_fields}`;
          return `<div class="sq-row">
            <span class="sq-num">${qi+1}</span>
            <span class="sq-subject">${q.subject||'—'}</span>
            <span class="sq-mod" style="background:${color}22;color:${color}">${MOD_LABELS[q.module]||q.module||'—'}</span>
            <span class="sq-result ${resultClass}">${resultText}</span>
          </div>`;
        }).join(''):`<div style="padding:16px 18px;font-size:.8rem;color:var(--muted)">No question detail available for this session.</div>`;

        return `<div class="session-card">
          <div class="session-card-hdr" onclick="toggleSession('sess_${i}')">
            <div class="session-card-hdr-left">
              <span class="session-num">S${sessionNum}</span>
              <div>
                <div class="session-date">${fmtDate(s.completed_at)}</div>
                <div class="session-meta">${modSummary}${s.elapsed_display?' · '+s.elapsed_display:''}</div>
              </div>
            </div>
            <div class="session-card-hdr-right">
              <span class="session-score-big" style="color:${scoreColor(pct)}">${pct}%</span>
              <span class="grade-pill ${gradeClass(grade)}">${grade}</span>
              <span class="session-time">${s.score}/${s.total}</span>
              <span class="session-chevron" id="chev_${i}">▶</span>
            </div>
          </div>
          <div class="session-questions" id="sess_${i}">
            <div class="sq-header">
              <span>#</span><span>Exercise</span><span>Module</span><span>Result</span>
            </div>
            ${qdRows}
          </div>
        </div>`;
      }).join('')}
    </div>`;

  document.getElementById('repProfile').innerHTML = heroHTML + chartHTML + modHTML + sessListHTML;
}

function toggleSession(id) {
  const el=document.getElementById(id);
  const chevIdx=id.replace('sess_','');
  const chev=document.getElementById('chev_'+chevIdx);
  if(el.classList.contains('show')){
    el.classList.remove('show');
    if(chev)chev.classList.remove('open');
  } else {
    el.classList.add('show');
    if(chev)chev.classList.add('open');
  }
}

function showDashboard() {
  document.getElementById('repProfile').style.display='none';
  document.getElementById('dashMain').style.display='block';
  document.getElementById('backBtn').style.display='none';
  document.getElementById('refreshBtn').style.display='inline-block';
  document.getElementById('refreshBtn').textContent='↻ Refresh';
  document.getElementById('headerSub').textContent='TRAINER DASHBOARD';
}

// Load on open
loadData();
</script>
